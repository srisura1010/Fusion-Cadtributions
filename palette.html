<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>CADtributions</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #8b949e;
    --accent: #58a6ff;
    --level0: #161b22;
    --level1: #0e4429;
    --level2: #006d32;
    --level3: #26a641;
    --level4: #39d353;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 13px;
    height: 100%;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  header {
    padding: 14px 18px 10px 18px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  header h1 {
    margin: 0 0 2px 0;
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  header .subtitle {
    color: var(--muted);
    font-size: 12px;
  }

  .stats {
    display: flex;
    gap: 22px;
    margin-top: 10px;
    flex-wrap: wrap;
    align-items: flex-end;
  }

  .stat {
    display: flex;
    flex-direction: column;
  }

  .stat .value {
    font-size: 18px;
    font-weight: 700;
    color: #ffffff;
  }

  .stat .label {
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  main {
    flex: 1;
    overflow: auto;
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  #graph-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  #graph-header .graph-title {
    font-size: 13px;
    font-weight: 600;
  }

  #graph-wrap {
    overflow-x: auto;
    padding-bottom: 4px;
  }

  #month-labels {
    display: flex;
    margin-left: 34px;
    margin-bottom: 4px;
    font-size: 11px;
    color: var(--muted);
    height: 14px;
    position: relative;
  }

  #graph {
    display: flex;
    gap: 3px;
  }

  .day-labels {
    display: flex;
    flex-direction: column;
    gap: 3px;
    margin-right: 6px;
    font-size: 10px;
    color: var(--muted);
    justify-content: flex-start;
  }

  .day-labels div {
    height: 11px;
    line-height: 11px;
  }

  .week-col {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .day-cell {
    width: 11px;
    height: 11px;
    border-radius: 2px;
    background: var(--level0);
    border: 1px solid rgba(255,255,255,0.04);
    cursor: pointer;
  }

  .day-cell.empty {
    visibility: hidden;
    cursor: default;
  }

  .day-cell[data-level="1"] { background: var(--level1); }
  .day-cell[data-level="2"] { background: var(--level2); }
  .day-cell[data-level="3"] { background: var(--level3); }
  .day-cell[data-level="4"] { background: var(--level4); }

  .day-cell.selected {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }

  .legend {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  .legend .day-cell { cursor: default; width: 10px; height: 10px; }

  #tooltip {
    position: fixed;
    background: #1c2128;
    border: 1px solid var(--border);
    padding: 6px 9px;
    border-radius: 6px;
    font-size: 12px;
    pointer-events: none;
    display: none;
    z-index: 10;
    max-width: 260px;
  }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    margin: 0 0 8px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  select {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 12px;
  }

  .filter-group {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .export-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
  }

  .export-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  #entries {
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .entry {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }

  .entry:last-child { border-bottom: none; }

  .entry .badge {
    flex-shrink: 0;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  .entry .main {
    flex: 1;
    min-width: 0;
  }

  .entry .message {
    color: var(--text);
    font-weight: 600;
    font-size: 12px;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .entry .path {
    color: var(--muted);
    font-size: 11px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .entry .path.has-link {
    cursor: pointer;
  }

  .entry .path.has-link:hover {
    color: var(--accent);
    text-decoration: underline;
  }

  .entry .meta {
    color: var(--muted);
    font-size: 11px;
    white-space: nowrap;
    flex-shrink: 0;
    text-align: right;
  }

  #show-more-wrap {
    margin-top: 10px;
    text-align: center;
  }

  .show-more-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
  }

  .show-more-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  #empty-state {
    color: var(--muted);
    text-align: center;
    padding: 40px 20px;
    font-size: 13px;
  }

  #empty-state strong {
    color: var(--text);
    display: block;
    margin-bottom: 6px;
    font-size: 14px;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>CADtributions</h1>
    <div class="subtitle">Every saved version and new file, tracked like a commit graph.</div>
    <div class="stats">
      <div class="stat"><span class="value" id="stat-total">0</span><span class="label">Total CADtributions</span></div>
      <div class="stat"><span class="value" id="stat-streak">0</span><span class="label">Current streak</span></div>
      <div class="stat"><span class="value" id="stat-longest">0</span><span class="label">Longest streak</span></div>
      <div class="stat"><span class="value" id="stat-today">0</span><span class="label">Today</span></div>
    </div>
  </header>

  <main>
    <div>
      <div id="graph-header">
        <span class="graph-title" id="graph-title">Last year</span>
        <div class="filter-group">
          <select id="year-filter">
            <option value="last-year">Last year</option>
          </select>
          <button class="export-btn" id="export-graph-btn">Download PNG</button>
        </div>
      </div>
      <div id="graph-wrap">
        <div id="month-labels"></div>
        <div id="graph">
          <div class="day-labels">
            <div></div><div>Mon</div><div></div><div>Wed</div><div></div><div>Fri</div><div></div>
          </div>
          <div id="weeks"></div>
        </div>
      </div>
      <div class="legend">
        <span>Less</span>
        <div class="day-cell" data-level="0"></div>
        <div class="day-cell" data-level="1"></div>
        <div class="day-cell" data-level="2"></div>
        <div class="day-cell" data-level="3"></div>
        <div class="day-cell" data-level="4"></div>
        <span>More</span>
      </div>
    </div>

    <div>
      <div class="section-title">
        <span id="entries-title">Recent CADtributions</span>
        <select id="project-filter">
          <option value="">All projects</option>
        </select>
      </div>
      <div id="entries"></div>
      <div id="show-more-wrap"></div>
      <div id="empty-state" style="display:none;">
        <strong>No CADtributions yet</strong>
        Save a design in Fusion 360 to make your first CADtribution.
      </div>
    </div>
  </main>
</div>

<div id="tooltip"></div>

<script>
  var allEntries = [];
  var selectedDate = null;
  var selectedProject = '';
  var selectedYear = 'last-year';
  var visibleCount = 10;
  var PAGE_SIZE = 10;

  var PALETTE_COLORS = {
    bg: '#0d1117',
    text: '#c9d1d9',
    muted: '#8b949e',
    levels: ['#161b22', '#0e4429', '#006d32', '#26a641', '#39d353']
  };

  function toDate(s) {
    var parts = s.split('-');
    return new Date(parseInt(parts[0],10), parseInt(parts[1],10)-1, parseInt(parts[2],10));
  }

  function fmtDateKey(d) {
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function fmtDateNice(d) {
    return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
  }

  function ordinalSuffix(n) {
    var j = n % 10, k = n % 100;
    if (j === 1 && k !== 11) return n + 'st';
    if (j === 2 && k !== 12) return n + 'nd';
    if (j === 3 && k !== 13) return n + 'rd';
    return n + 'th';
  }

  function fmtDateShort(d) {
    var month = d.toLocaleDateString(undefined, { month: 'long' });
    return month + ' ' + ordinalSuffix(d.getDate());
  }

  function render(entries) {
    allEntries = entries || [];
    renderStats();
    renderProjectFilter();
    renderYearFilter();
    renderGraph();
    renderEntries();
  }

  // Works out the date range to actually display: either the rolling
  // 365-day window ending today (default), or a fixed Jan-Dec calendar
  // year if the person picked one from the dropdown.
  //
  // gridStart is padded back to the preceding Sunday purely so the grid
  // columns line up -- it is NOT real data and must never be treated as
  // part of the year. dataStart/dataEnd are the true Jan 1 / Dec 31
  // boundaries (or Jan 1 / today for the current year) used for
  // everything else: counts, quartiles, totals, and hiding cells.
  function getViewRange() {
    var today = new Date();
    today.setHours(0, 0, 0, 0);

    if (selectedYear === 'last-year') {
      var dataEnd = today;
      var gridStart = new Date(today);
      gridStart.setDate(gridStart.getDate() - 52 * 7);
      gridStart.setDate(gridStart.getDate() - gridStart.getDay());
      return { gridStart: gridStart, dataStart: gridStart, dataEnd: dataEnd };
    }

    var y = parseInt(selectedYear, 10);
    var dataStart = new Date(y, 0, 1);
    var dataEnd = new Date(y, 11, 31);

    var gridStart = new Date(dataStart);
    gridStart.setDate(gridStart.getDate() - gridStart.getDay());

    return { gridStart: gridStart, dataStart: dataStart, dataEnd: dataEnd };
  }

  function countsByDate() {
    var counts = {};
    allEntries.forEach(function(e) {
      if (selectedProject && e.project !== selectedProject) return;
      counts[e.date] = (counts[e.date] || 0) + 1;
    });
    return counts;
  }

  function countsInRange(rangeStart, rangeEnd) {
    var counts = {};
    allEntries.forEach(function(e) {
      if (selectedProject && e.project !== selectedProject) return;
      var d = toDate(e.date);
      if (d < rangeStart || d > rangeEnd) return;
      counts[e.date] = (counts[e.date] || 0) + 1;
    });
    return counts;
  }

  function computeTotalForView(rangeStart, rangeEnd) {
    var total = 0;
    allEntries.forEach(function(e) {
      if (selectedProject && e.project !== selectedProject) return;
      var d = toDate(e.date);
      if (d < rangeStart || d > rangeEnd) return;
      total += 1;
    });
    return total;
  }

  function renderStats() {
    var range = getViewRange();
    document.getElementById('stat-total').textContent =
      computeTotalForView(range.dataStart, range.dataEnd);

    // Streaks stay based on your whole history, regardless of which
    // year you're browsing -- it's a personal all-time stat, not a
    // per-view one.
    var counts = countsByDate();
    var todayKey = fmtDateKey(new Date());
    document.getElementById('stat-today').textContent = counts[todayKey] || 0;

    var dayKeys = Object.keys(counts);
    var current = 0;
    var cursor = new Date();
    if (!counts[fmtDateKey(cursor)]) {
      cursor.setDate(cursor.getDate() - 1);
    }
    while (counts[fmtDateKey(cursor)]) {
      current += 1;
      cursor.setDate(cursor.getDate() - 1);
    }

    var longest = 0;
    var run = 0;
    var sortedKeys = dayKeys.sort();
    var prev = null;
    sortedKeys.forEach(function(k) {
      if (prev) {
        var prevDate = toDate(prev);
        var curDate = toDate(k);
        var diffDays = Math.round((curDate - prevDate) / 86400000);
        if (diffDays === 1) { run += 1; } else { run = 1; }
      } else {
        run = 1;
      }
      longest = Math.max(longest, run);
      prev = k;
    });

    document.getElementById('stat-streak').textContent = current;
    document.getElementById('stat-longest').textContent = longest;
  }

  function renderProjectFilter() {
    var select = document.getElementById('project-filter');
    var projects = {};
    allEntries.forEach(function(e){ projects[e.project] = true; });
    var current = select.value;
    select.innerHTML = '<option value="">All projects</option>';
    Object.keys(projects).sort().forEach(function(p) {
      var opt = document.createElement('option');
      opt.value = p;
      opt.textContent = p;
      select.appendChild(opt);
    });
    select.value = current;
  }

  function renderYearFilter() {
    var select = document.getElementById('year-filter');
    var years = {};
    allEntries.forEach(function(e){ years[e.date.substring(0, 4)] = true; });
    years[String(new Date().getFullYear())] = true;

    var yearList = Object.keys(years).sort(function(a, b) { return b - a; });
    var current = select.value || 'last-year';

    select.innerHTML = '<option value="last-year">Last year</option>';
    yearList.forEach(function(y) {
      var opt = document.createElement('option');
      opt.value = y;
      opt.textContent = y;
      select.appendChild(opt);
    });
    select.value = current;

    document.getElementById('graph-title').textContent =
      (current === 'last-year') ? 'Last year' : current;
  }

  function percentile(sortedValues, p) {
    if (sortedValues.length === 0) return 0;
    if (sortedValues.length === 1) return sortedValues[0];
    var idx = p * (sortedValues.length - 1);
    var lower = Math.floor(idx);
    var upper = Math.ceil(idx);
    var weight = idx - lower;
    if (upper >= sortedValues.length) return sortedValues[sortedValues.length - 1];
    return sortedValues[lower] * (1 - weight) + sortedValues[upper] * weight;
  }

  function computeQuartiles(counts) {
    var values = [];
    for (var key in counts) {
      if (counts[key] > 0) values.push(counts[key]);
    }
    if (values.length === 0) {
      return { q1: 0, q2: 0, q3: 0, outlierThreshold: Infinity };
    }
    values.sort(function(a, b) { return a - b; });

    var rawQ1 = percentile(values, 0.25);
    var rawQ3 = percentile(values, 0.75);
    var iqr = rawQ3 - rawQ1;
    var outlierThreshold = rawQ3 + 1.5 * iqr;

    var filtered = values.filter(function(v) { return v <= outlierThreshold; });
    if (filtered.length === 0) filtered = values;

    return {
      q1: percentile(filtered, 0.25),
      q2: percentile(filtered, 0.5),
      q3: percentile(filtered, 0.75),
      outlierThreshold: outlierThreshold
    };
  }

  function levelFor(count, quartiles) {
    if (!count) return 0;
    if (count > quartiles.outlierThreshold) return 4;
    if (count >= quartiles.q3) return 4;
    if (count >= quartiles.q2) return 3;
    if (count >= quartiles.q1) return 2;
    return 1;
  }

  function renderGraph() {
    var weeksEl = document.getElementById('weeks');
    var monthLabelsEl = document.getElementById('month-labels');
    weeksEl.innerHTML = '';
    weeksEl.style.display = 'flex';
    weeksEl.style.gap = '3px';
    monthLabelsEl.innerHTML = '';

    var range = getViewRange();
    var counts = countsInRange(range.dataStart, range.dataEnd);
    var quartiles = computeQuartiles(counts);

    var start = range.gridStart;
    var dataStart = range.dataStart;
    var dataEnd = range.dataEnd;

    var totalDays = Math.round((dataEnd - start) / 86400000) + 1;
    var totalWeeks = Math.ceil((totalDays + start.getDay()) / 7);

    var lastMonth = -1;
    var cellSize = 14; // 11px cell + 3px gap

    for (var w = 0; w < totalWeeks; w++) {
      var col = document.createElement('div');
      col.className = 'week-col';

      for (var d = 0; d < 7; d++) {
        var cellDate = new Date(start);
        cellDate.setDate(start.getDate() + w * 7 + d);

        if (cellDate < dataStart || cellDate > dataEnd) {
          var empty = document.createElement('div');
          empty.className = 'day-cell empty';
          col.appendChild(empty);
          continue;
        }

        var key = fmtDateKey(cellDate);
        var count = counts[key] || 0;
        var cell = document.createElement('div');
        cell.className = 'day-cell';
        cell.setAttribute('data-level', levelFor(count, quartiles));
        cell.setAttribute('data-date', key);
        cell.setAttribute('data-count', count);
        if (key === selectedDate) cell.classList.add('selected');

        cell.addEventListener('mouseenter', showTooltip);
        cell.addEventListener('mousemove', moveTooltip);
        cell.addEventListener('mouseleave', hideTooltip);
        cell.addEventListener('click', function() {
          var clickedDate = this.getAttribute('data-date');
          selectedDate = (selectedDate === clickedDate) ? null : clickedDate;
          visibleCount = PAGE_SIZE;
          renderGraph();
          renderEntries();
        });

        col.appendChild(cell);

        if (d === 0 && cellDate.getMonth() !== lastMonth) {
          lastMonth = cellDate.getMonth();
          var label = document.createElement('div');
          label.style.position = 'absolute';
          label.style.left = (w * cellSize) + 'px';
          label.textContent = cellDate.toLocaleDateString(undefined, { month: 'short' });
          monthLabelsEl.appendChild(label);
        }
      }
      weeksEl.appendChild(col);
    }
    monthLabelsEl.style.position = 'relative';
  }

  function showTooltip(e) {
    var count = e.target.getAttribute('data-count');
    var date = e.target.getAttribute('data-date');
    var tooltip = document.getElementById('tooltip');
    var d = toDate(date);
    var noun = count == 1 ? 'CADtribution' : 'CADtributions';
    tooltip.textContent = count + ' ' + noun + ' on ' + fmtDateShort(d);
    tooltip.style.display = 'block';
    moveTooltip(e);
  }

  function moveTooltip(e) {
    var tooltip = document.getElementById('tooltip');
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top = (e.clientY + 12) + 'px';
  }

  function hideTooltip() {
    document.getElementById('tooltip').style.display = 'none';
  }

  function drawRoundedRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // Renders the currently-selected view onto an offscreen canvas, then
  // sends the raw image bytes to Fusion (via fusionSendData) so Python can
  // write it to disk using Fusion's own native Save dialog. A plain
  // <a download> click doesn't work here -- Fusion's embedded palette
  // browser has no real download manager to catch it.
  function exportGraphAsPNG() {
    var range = getViewRange();
    var counts = countsInRange(range.dataStart, range.dataEnd);
    var quartiles = computeQuartiles(counts);

    var start = range.gridStart;
    var dataStart = range.dataStart;
    var dataEnd = range.dataEnd;

    var totalDays = Math.round((dataEnd - start) / 86400000) + 1;
    var totalWeeks = Math.ceil((totalDays + start.getDay()) / 7);

    var cellSize = 11;
    var cellGap = 3;
    var cellStep = cellSize + cellGap;
    var leftMargin = 30;
    var topMargin = 44;
    var bottomMargin = 30;
    var rightPadding = 14;

    var width = leftMargin + totalWeeks * cellStep + rightPadding;
    var height = topMargin + 7 * cellStep + bottomMargin;

    var EXPORT_SCALE = 3;

    var canvas = document.createElement('canvas');
    canvas.width = width * EXPORT_SCALE;
    canvas.height = height * EXPORT_SCALE;
    var ctx = canvas.getContext('2d');
    ctx.scale(EXPORT_SCALE, EXPORT_SCALE);

    ctx.fillStyle = PALETTE_COLORS.bg;
    ctx.fillRect(0, 0, width, height);

    var titleText = 'CADtributions -- ' +
      (selectedYear === 'last-year' ? 'Last year' : selectedYear);
    ctx.fillStyle = PALETTE_COLORS.text;
    ctx.font = 'bold 14px -apple-system, "Segoe UI", Arial, sans-serif';
    ctx.fillText(titleText, leftMargin, 18);

    ctx.font = '10px -apple-system, "Segoe UI", Arial, sans-serif';
    ctx.fillStyle = PALETTE_COLORS.muted;
    var dayLabelRows = { 1: 'Mon', 3: 'Wed', 5: 'Fri' };
    Object.keys(dayLabelRows).forEach(function(rowIdx) {
      var y = topMargin + parseInt(rowIdx, 10) * cellStep + cellSize;
      ctx.fillText(dayLabelRows[rowIdx], 0, y);
    });

    var lastMonth = -1;
    for (var w = 0; w < totalWeeks; w++) {
      for (var d = 0; d < 7; d++) {
        var cellDate = new Date(start);
        cellDate.setDate(start.getDate() + w * 7 + d);

        if (cellDate < dataStart || cellDate > dataEnd) continue;

        var x = leftMargin + w * cellStep;
        var y = topMargin + d * cellStep;

        var key = fmtDateKey(cellDate);
        var count = counts[key] || 0;
        var level = levelFor(count, quartiles);

        ctx.fillStyle = PALETTE_COLORS.levels[level];
        drawRoundedRect(ctx, x, y, cellSize, cellSize, 2);
        ctx.fill();

        if (d === 0 && cellDate.getMonth() !== lastMonth) {
          lastMonth = cellDate.getMonth();
          ctx.fillStyle = PALETTE_COLORS.muted;
          ctx.font = '11px -apple-system, "Segoe UI", Arial, sans-serif';
          ctx.fillText(
            cellDate.toLocaleDateString(undefined, { month: 'short' }),
            x, topMargin - 8
          );
        }
      }
    }

    var legendY = height - 16;
    var legendX = leftMargin;
    ctx.font = '10px -apple-system, "Segoe UI", Arial, sans-serif';
    ctx.fillStyle = PALETTE_COLORS.muted;
    ctx.fillText('Less', legendX, legendY + 8);
    legendX += 28;
    PALETTE_COLORS.levels.forEach(function(hex) {
      ctx.fillStyle = hex;
      drawRoundedRect(ctx, legendX, legendY, 10, 10, 2);
      ctx.fill();
      legendX += 14;
    });
    ctx.fillStyle = PALETTE_COLORS.muted;
    ctx.fillText('More', legendX + 4, legendY + 8);

    var fileLabel = (selectedYear === 'last-year') ? 'last-year' : selectedYear;
    var dataUrl = canvas.toDataURL('image/png');
    var base64Data = dataUrl.split(',')[1];

    adsk.fusionSendData('exportPng', JSON.stringify({
      data: base64Data,
      filename: 'cadtributions-' + fileLabel + '.png'
    }));
  }

  function renderEntries() {
    var container = document.getElementById('entries');
    var emptyState = document.getElementById('empty-state');
    var titleEl = document.getElementById('entries-title');
    var showMoreWrap = document.getElementById('show-more-wrap');
    container.innerHTML = '';
    showMoreWrap.innerHTML = '';

    var filtered = allEntries.filter(function(e) {
      if (selectedProject && e.project !== selectedProject) return false;
      if (selectedDate && e.date !== selectedDate) return false;
      return true;
    });

    filtered.sort(function(a,b){ return b.timestamp.localeCompare(a.timestamp); });

    if (selectedDate) {
      var d = toDate(selectedDate);
      titleEl.textContent = 'CADtributions on ' + fmtDateNice(d);
    } else {
      titleEl.textContent = 'Recent CADtributions';
    }

    if (filtered.length === 0) {
      container.style.display = 'none';
      emptyState.style.display = 'block';
      if (allEntries.length > 0) {
        emptyState.innerHTML = '<strong>No CADtributions here</strong>Try a different day or project filter.';
      } else {
        emptyState.innerHTML = '<strong>No CADtributions yet</strong>Save a design in Fusion 360 to make your first CADtribution.';
      }
      return;
    }

    container.style.display = 'block';
    emptyState.style.display = 'none';

    var toShow = filtered.slice(0, visibleCount);

    toShow.forEach(function(e) {
      var row = document.createElement('div');
      row.className = 'entry';
      var badge = document.createElement('div');
      badge.className = 'badge';
      row.appendChild(badge);

      var main = document.createElement('div');
      main.className = 'main';

      if (e.description) {
        var messageLine = document.createElement('div');
        messageLine.className = 'message';
        messageLine.textContent = e.description;
        main.appendChild(messageLine);
      }

      var pathLine = document.createElement('div');
      pathLine.className = 'path';
      pathLine.textContent = e.path || e.project;
      if (e.fileId) {
        pathLine.classList.add('has-link');
        pathLine.addEventListener('click', function() {
          adsk.fusionSendData('openFile', JSON.stringify({ fileId: e.fileId }));
        });
      }
      main.appendChild(pathLine);
      row.appendChild(main);

      var meta = document.createElement('div');
      meta.className = 'meta';

      var when = new Date(e.timestamp);
      meta.innerHTML = 'v' + e.version + '<br>' + when.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
      row.appendChild(meta);

      container.appendChild(row);
    });

    var remaining = filtered.length - toShow.length;
    
    if (remaining > 0) {
      var btn = document.createElement('button');
      btn.className = 'show-more-btn';
      btn.textContent = 'Show ' + Math.min(PAGE_SIZE, remaining) + ' more';
      btn.addEventListener('click', function() {
        visibleCount += PAGE_SIZE;
        renderEntries();
      });
      showMoreWrap.appendChild(btn);
    }
  }

  document.getElementById('project-filter').addEventListener('change', function(e) {
    selectedProject = e.target.value;
    visibleCount = PAGE_SIZE;
    renderStats();
    renderGraph();
    renderEntries();
  });

  document.getElementById('year-filter').addEventListener('change', function(e) {
    selectedYear = e.target.value;
    document.getElementById('graph-title').textContent =
      (selectedYear === 'last-year') ? 'Last year' : selectedYear;
    selectedDate = null;
    visibleCount = PAGE_SIZE;
    renderStats();
    renderGraph();
    renderEntries();
  });

  document.getElementById('export-graph-btn').addEventListener('click', exportGraphAsPNG);

  // Receives pushes from Fusion (e.g. a live update right after a save).
  window.fusionJavaScriptHandler = {
    handle: function(action, data) {
      try {
        if (action === 'populate') {
          render(JSON.parse(data));
          return JSON.stringify({ status: 'OK' });
        }
        return JSON.stringify({ status: 'ignored' });
      } catch (err) {
        return JSON.stringify({ status: 'error', message: String(err) });
      }
    }
  };

  // Ask Fusion for the current data as soon as the palette loads.
  (function init() {
    try {
      var response = adsk.fusionSendData('ready', '');
      if (response) {
        render(JSON.parse(response));
      }
    } catch (err) {
      render([]);
    }
  })();
</script>
</body>
</html>
